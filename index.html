<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STUDENT MODULE</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="box-container">
        <form>
            <h1>Add new student</h1>
            <p>Fill in all fields to create a record</p>
            <h2>PERSONAL INFORMATION</h2>
            <label for="fn">FIRST NAME</label><br>
            <input type="text" id="fn" name="fn" placeholder="e.g.Maria" required><br>
            <label for="mn">MIDDLE NAME</label><br>
            <input type="text" id="mn" name="mn" placeholder="e.g.Del Rosario" required><br>
            <label for="ln">LAST NAME</label><br>
            <input type="text" id="ln" name="ln" placeholder="e.g.Santos" required><br>
            <label for="suff">SUFFIX</label><br>
            <input type="text" id="suff" name="suff" placeholder="e.g.Jr."><br>
            <label for="bday">DATE OF BIRTH</label><br>
            <input type="date" id="bday" name="bday" placeholder="MM/DD/YYYY" required><br>
            <label for="mail">EMAIL ADDRESS</label><br>
            <input type="email" id="mail" name="mail" placeholder="e.g.maria@gmail.com" required><br>
            <label for="number">CONTACT NUMBER</label><br>
            <input type="tel"  id="number" name="number" placeholder="e.g. 09XX XXX XXXX"><br>
            <label for="acads">ACADEMIC INFORMATION</label><br>
            <label for="course">COURSESR/PROGRAM</label><br>
            <select name="course" id="course"><br>
                <option value="Select course..."></option>
                <option value="Bachelor of Science in Information Management"></option>
            </select><br>
            <label for="year">YEAR</label><br>
            <select name="year" id="year">
                 <option value=""></option>
                <option value="1st Year">
                </option>
                <option value="2nd Year">
                </option>
                <option value="3rd Year">
                </option>
                <option value="4th Year">
                </option>
            </select><br>
            <label for="status">STATUS</label><br>
            <select name="status" id="status">
                <option value="Active"></option>
                <option value="Inactive"></option>
            </select><br>
            <button type="submit">Add Student</button>
        </form>
        </div>
        
        <div class="header">
            <h1>Student Record</h1>
            <p>Web System ^ Technologies - A.Y. 2024-2025</p>
        </div>

        <div class="total">
            <h1>TOTAL STUDENTS</h1>
            <h2>24</h2>
            <p>Enrolled in this semester</p>
        </div>

        <div class="activestuds">
            <h1>ACTIVE STUDENTS</h1>
            <H2>19</H2>
            <p>79% of total enrolled</p>
        </div>

        <div class="inact">
            <h1>INACTIVE</h1>
            <h2>5</h2>
            <p>Not currently enrolled</p>
        </div>
    </div>
</body>
</html>
